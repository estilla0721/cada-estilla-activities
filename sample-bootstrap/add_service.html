<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Service</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>
body { background-color: #dff5ec; font-family: Arial, sans-serif; }
.navbar { background-color: #ecfdf5 !important; box-shadow: 0 4px 10px rgba(16,185,129,0.15); }
.navbar-brand { font-weight: bold; color: #065f46 !important; }
.service-box { max-width: 600px; margin: 50px auto; padding: 25px; background:#f0fdf9; border-radius:12px; box-shadow:0 4px 10px rgba(16,185,129,0.15);}
label { font-weight:500; color:#065f46; }
input.form-control { background:#e6f6ed; border:1.5px solid rgba(16,185,129,0.3); border-radius:8px; color:#065f46; transition:0.3s;}
input.form-control:focus { background:#d1f5e3; border-color:#10b981; box-shadow:0 0 8px rgba(16,185,129,0.4); outline:none; }
.btn-success, .btn-secondary { border-radius:8px; font-weight:600; transition:all 0.3s ease; }
.btn-success { background: linear-gradient(135deg,#10b981,#34d399); border:none; color:#064e3b; }
.btn-secondary { background: #d1f5e3; color:#065f46; border:none; }
.btn-success:hover, .btn-secondary:hover { transform: scale(1.05); box-shadow:0 0 12px rgba(16,185,129,0.3);}
</style>
</head>
<body>

<nav class="navbar">
  <div class="container">
    <span class="navbar-brand"><i class="bi bi-building"></i> EMPLOYEE INFO SYSTEM</span>
  </div>
</nav>

<div class="service-box">
    <h2 class="mb-4">Add Service</h2>
    <form id="serviceForm">
        <div class="mb-3">
            <label>Position</label>
            <input type="text" class="form-control" id="positionInput" required>
        </div>
        <div class="mb-3">
            <label>Start Date</label>
            <input type="date" class="form-control" id="startInput" required>
        </div>
        <div class="mb-3">
            <label>End Date</label>
            <input type="date" class="form-control" id="endInput" required>
        </div>
        <button type="submit" class="btn btn-success">Add</button>
        <button type="button" class="btn btn-secondary" id="backBtn">Back</button>
    </form>
</div>

<script>
let servicesData = JSON.parse(localStorage.getItem("services")) || {};
if(!servicesData["main"]) servicesData["main"] = [];

document.getElementById("serviceForm").addEventListener("submit", function(e){
    e.preventDefault();
    const newService = {
        position: document.getElementById("positionInput").value.trim(),
        start: document.getElementById("startInput").value,
        end: document.getElementById("endInput").value
    };
    servicesData["main"].push(newService);
    localStorage.setItem("services", JSON.stringify(servicesData));
    window.location.href = `service_record.html`;
});

document.getElementById("backBtn").onclick = () => { window.location.href = `service_record.html`; };
</script>

</body>
</html>
