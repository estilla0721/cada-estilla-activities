<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login · Modern Tint</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="./css/login.css">

</head>
<body>

<div class="login-box">
<form id="loginForm">

<input type="text" id="username" class="form-control" placeholder="Username" required>
<input type="password" id="password" class="form-control" placeholder="Password" required>

<div class="d-grid">
<button type="submit" class="btn btn-it">Login</button>
</div>

<p id="errorMsg" class="text-danger mt-3 text-center small"></p>

</form>
</div>

<!-- Activity Logger -->
<script src="./js/activity_logger.js"></script>

<script>

const loginForm = document.getElementById("loginForm");

loginForm.addEventListener("submit", function(e){

e.preventDefault();

const username = document.getElementById("username").value.trim();
const password = document.getElementById("password").value.trim();
const errorMsg = document.getElementById("errorMsg");

const correctUsername = "estilla";
const correctPassword = "12345";

if(username === correctUsername && password === correctPassword){

logActivity("User Login", username);

localStorage.setItem("currentUser", username);

window.location.href = "dashboard.html";

}else{

errorMsg.textContent = "Invalid username or password!";

logActivity("Failed Login Attempt", username);

}

});

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
