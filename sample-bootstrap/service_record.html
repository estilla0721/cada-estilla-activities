<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Service</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="./css/service.css">
</head>
<body>

<nav class="navbar">
  <div class="container">
    <span class="navbar-brand"><i class="bi bi-building"></i> EMPLOYEE INFO SYSTEM</span>
  </div>
</nav>

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">Service Record</h2>
        <button class="btn btn-primary" id="addServiceBtn"><i class="bi bi-plus-circle"></i> Add</button>
    </div>

    <div class="mb-3">
        <input type="text" class="form-control w-25" id="searchService" placeholder="Search...">
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover align-middle" id="serviceTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Position</th>
                            <th>Start</th>
                            <th>End</th>
                            <th width="150">Action</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
let servicesData = JSON.parse(localStorage.getItem("services")) || {};
if(!servicesData["main"]) servicesData["main"] = []; // single default key
const serviceTableBody = document.querySelector("#serviceTable tbody");
const searchInput = document.getElementById("searchService");

function renderTable(filter="") {
    serviceTableBody.innerHTML = "";
    const filtered = servicesData["main"].filter(s => 
        s.position.toLowerCase().includes(filter.toLowerCase()) ||
        s.start.includes(filter) ||
        s.end.includes(filter)
    );

    if(filtered.length === 0){
        serviceTableBody.innerHTML = `<tr><td colspan="5" class="text-center text-muted">— no service records added yet —</td></tr>`;
        return;
    }

    filtered.forEach((s, idx) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${idx+1}</td>
            <td>${s.position}</td>
            <td>${s.start}</td>
            <td>${s.end}</td>
            <td>
                <button class="btn btn-sm btn-warning editBtn">Edit</button>
                <button class="btn btn-sm btn-danger deleteBtn">Delete</button>
            </td>
        `;
        tr.querySelector(".deleteBtn").onclick = () => {
            servicesData["main"].splice(idx,1);
            localStorage.setItem("services", JSON.stringify(servicesData));
            renderTable(searchInput.value);
        };
        tr.querySelector(".editBtn").onclick = () => {
            window.location.href = `edit_service.html?index=${idx}`;
        };
        serviceTableBody.appendChild(tr);
    });
}

searchInput.addEventListener("input", ()=> renderTable(searchInput.value));

document.getElementById("addServiceBtn").onclick = () => {
    window.location.href = `add_service.html`;
};

renderTable();
</script>

</body>
</html>
